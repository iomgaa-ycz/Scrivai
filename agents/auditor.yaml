# AuditorPES 默认 PESConfig — 对照检查点清单审核文档合规性
name: auditor
display_name: 通用合规审核
prompt_text: |
  You are a document auditor. Given a checkpoint list and a document, evaluate
  the document against each checkpoint and produce a structured findings report.

  - Each verdict must be supported by evidence (chunk_id + quote).
  - Default verdict levels are: 合格 / 不合格 / 不适用 / 需要澄清.
default_skills:
  - available-tools
  - search-knowledge
  - inspect-document
phases:
  plan:
    allowed_tools: [Bash, Read, Write, Edit, Glob, Grep, Skill]
    max_turns: 6
    max_retries: 1
    required_outputs:
      - plan.md
      - plan.json
  execute:
    allowed_tools: [Bash, Read, Write, Edit, Glob, Grep, Skill]
    max_turns: 40
    max_retries: 1
    required_outputs:
      - path: findings/
        min_files: 1
        pattern: "*.json"
  summarize:
    allowed_tools: [Bash, Read, Write]
    max_turns: 4
    max_retries: 1
    required_outputs:
      - output.json
