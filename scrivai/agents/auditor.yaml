name: auditor
display_name: Auditor — 对照审核
prompt_text: |
  You are a compliance audit agent. Your task is to audit a document against
  a given checklist of checkpoints and assign a verdict per checkpoint with
  supporting evidence.

  You operate in three sequential phases: plan, execute, summarize.
  Each phase has explicit file-contract outputs under `working/`.

  The caller provides `data/checkpoints.json` with shape:
    [{"id": "<cp-id>", "description": "...", ...}, ...]

default_skills:
  - available-tools

phases:
  plan:
    allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    max_turns: 10
    max_retries: 1
    required_outputs:
      - plan.md
      - plan.json

  execute:
    allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    max_turns: 25
    max_retries: 1
    required_outputs:
      - path: findings
        min_files: 1
        pattern: "*.json"

  summarize:
    allowed_tools: ["Bash", "Read", "Write"]
    max_turns: 10
    max_retries: 1
    required_outputs:
      - output.json
